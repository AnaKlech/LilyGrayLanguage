<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

<script>
var EYE_OFF='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
var EYE_ON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

var QS=[

// ── Q1: Pronoun case — objective after preposition (L.6.1a) ──────────────────
{skill:"Pronoun Case",sc:"#534AB7",sb:"#EEEDFE",
q:'Which pronoun correctly completes the sentence?\n\n"The coach pulled aside Marcus and ___ to discuss the strategy before the game."',
tip:"Think about the role this pronoun plays in the sentence — is it doing the action or receiving it?",
hint:'Pronouns have two main forms: subject pronouns (I, he, she, we, they) perform the action, and object pronouns (me, him, her, us, them) receive the action or follow a preposition. In this sentence, the coach is pulling someone aside — Marcus and the pronoun are both receiving the action. Which form belongs when a pronoun receives an action rather than performing one?',
opts:["I","he","him","they"],
ans:2,
wrongs:["'I' is a subject pronoun — it performs an action ('I ran'). Here, Marcus and the pronoun are being pulled aside by the coach. They are receiving the action, not performing it. Look for an object pronoun.",null,"'He' is also a subject pronoun. The action is being done to Marcus and ___, not by them. Which pronoun form receives an action?","'They' is a subject pronoun referring to multiple people. This sentence adds one person alongside Marcus. Find the object pronoun for a single person."],
exp:'"Him" is correct. When a pronoun receives an action from a verb, or follows a preposition, it must be in objective (object) form: me, him, her, us, them. Here Marcus and him are both receiving the action "pulled aside." Using "I" or "he" (subject pronouns) in the object position is called hypercorrection — it sounds formal but breaks the grammar rule.\n\nSubject pronouns: I, he, she, we, they (perform the action)\nObject pronouns: me, him, her, us, them (receive the action or follow a preposition)',
mapTo:"G6.11 Q4",teks:"L.6.1a",
prevFails:[{test:"G6.9",q:"Q7",err:'Chose "I" after preposition "between" — hypercorrection, subject pronoun used where objective pronoun is required.'}]},

// ── Q2: Pronoun case — after preposition (L.6.1a) ───────────────────────────
{skill:"Pronoun Case",sc:"#534AB7",sb:"#EEEDFE",
q:'Which change, if any, is needed to the underlined word?\n\n"The project was divided equally among Darius, Sofia, and I."',
tip:"Identify what grammatical job the underlined pronoun is doing in this sentence.",
hint:'The word "among" is a preposition. Prepositions (among, between, for, to, with, by, from, about) are always followed by object pronouns — never subject pronouns. A reliable test: remove the other names and say just the preposition + pronoun alone. Does "among I" sound right? Does "among me"? Whichever sounds correct follows the grammar rule.',
opts:["Change I to me","Change I to myself","Change I to we","No change"],
ans:0,
wrongs:[null,"'Myself' is a reflexive or intensive pronoun. Reflexive: 'I hurt myself.' Intensive: 'I did it myself.' Neither use fits here — 'myself' cannot serve as the object of a preposition. You need a plain object pronoun after 'among.'","'We' is a subject pronoun, just like 'I.' Replacing one subject pronoun with another does not fix the problem. The issue is that prepositions require object pronouns entirely.","'Among Darius, Sofia, and I' is incorrect. 'I' is a subject pronoun and cannot follow the preposition 'among.' The sentence does need a change."],
exp:'"Me" is correct. Prepositions always require object pronouns (me, him, her, us, them). "Among Darius, Sofia, and me" is the correct form. Remove the other names to test: "among I" sounds wrong; "among me" sounds right. This same rule applies to between, for, to, with, by, and all other prepositions.\n\nCommon hypercorrection error: people say "and I" to sound formal, but after a preposition, "and me" is always correct.',
mapTo:"G6.11 Q1",teks:"L.6.1a",
prevFails:[{test:"G6.9",q:"Q7",err:'Chose subject pronoun "I" after preposition "between" instead of objective "me."'}]},

// ── Q3: Pronoun person shift (L.6.1d) ───────────────────────────────────────
{skill:"Pronoun Person Shift",sc:"#534AB7",sb:"#EEEDFE",
q:'Select the pronoun that creates an error in person consistency in the passage below.\n\n"When a new employee joins the company, he or she should review the handbook carefully. If an employee has questions, you can contact the HR department at any time."',
tip:"Track which grammatical person the passage uses and check whether it stays consistent throughout.",
hint:'Pronouns come in three persons:\n• First person: I, me, we, us, my, our (the speaker)\n• Second person: you, your (the listener)\n• Third person: he, she, it, they, him, her, them, his, her (someone else)\n\nA passage should stay in one person consistently. The first sentence uses "a new employee... he or she" — third person. Read the second sentence word by word and find any pronoun that switches to a different person.',
opts:["he or she","an employee","you","the HR department"],
ans:2,
wrongs:["'He or she' is third person and matches 'a new employee' — consistent and correct. The error is in a different pronoun that switches away from third person.",null,"'An employee' is a noun, not a pronoun. Nouns cannot cause person-shift errors. Look for a pronoun that switches from the person established in the first sentence.","'The HR department' is a noun phrase, not a pronoun. The error is in a pronoun — find the one that shifts from the third-person used in the first sentence to a different person."],
exp:'"You" is the error. The passage establishes third person in the first sentence ("a new employee... he or she") but shifts to second person ("you can contact") in the second sentence. This is called a pronoun person shift — an error because it makes the writing feel inconsistent.\n\nThe three grammatical persons:\n• First person (I/we) — the writer or speaker\n• Second person (you) — the reader or listener  \n• Third person (he/she/they/one) — someone being talked about\n\nThe second sentence should read: "he or she can contact the HR department" to maintain third-person consistency.',
mapTo:"G6.11 Q12",teks:"L.6.1d",
prevFails:[{test:"G6.9",q:"Q20",err:'Chose "them" as the error — focused on reference clarity rather than recognizing the 3rd-to-2nd person shift as the actual error.'}]},

// ── Q4: Intensive pronoun (L.6.1b) ──────────────────────────────────────────
{skill:"Intensive Pronouns",sc:"#534AB7",sb:"#EEEDFE",
q:'Read the four sentences. Which one uses an intensive pronoun incorrectly?\n\n(1) The director herself reviewed every scene before the premiere.\n(2) We built the entire stage ourselves, without any outside help.\n(3) Myself forgot to submit the permission slip before the deadline.\n(4) The student himself asked to retake the exam.',
tip:"Identify what each intensive pronoun is doing in its sentence and whether that use follows the rules.",
hint:'Intensive pronouns (myself, yourself, himself, herself, itself, ourselves, yourselves, themselves) have two valid uses:\n1. EMPHASIS — placed right after the noun or pronoun they emphasize: "The president himself signed it." The sentence still makes sense if you remove the intensive pronoun.\n2. REFLEXIVE — when the subject and object are the same person: "I hurt myself."\n\nIntensive pronouns CANNOT stand alone as the subject of a sentence. Test each sentence: is the intensive pronoun emphasizing a subject that is already there, or is it trying to replace a subject pronoun entirely?',
opts:["Sentence 1","Sentence 2","Sentence 3","Sentence 4"],
ans:2,
wrongs:["In sentence 1, 'herself' emphasizes 'The director' — a subject that is already present. Remove 'herself' and the sentence still works: 'The director reviewed every scene.' This is valid intensive use.","In sentence 2, 'ourselves' emphasizes 'We' — a subject that is already present. Remove 'ourselves' and the sentence still works: 'We built the entire stage.' Valid intensive use.","In sentence 4, 'himself' emphasizes 'The student' — a subject that is already present. Remove 'himself' and the sentence still works: 'The student asked to retake the exam.' Valid intensive use.",null],
exp:'Sentence 3 is incorrect. "Myself forgot to submit the permission slip" uses "Myself" as the subject of the sentence — but intensive pronouns cannot stand alone as a grammatical subject. The correct subject pronoun is "I": "I forgot to submit the permission slip."\n\nIntensive pronouns (myself, yourself, himself, herself, itself, ourselves, yourselves, themselves) can only:\n1. Emphasize a noun or pronoun already in the sentence: "I myself was surprised."\n2. Refer back to the subject reflexively: "She hurt herself."\n\nThey can never replace "I," "he," "she," "we," or other subject pronouns.',
mapTo:"G6.11 Q19",teks:"L.6.1b",
prevFails:[{test:"G6.7",q:"Q11",err:'Typed ",yourself" — inserted an extraneous comma before the intensive pronoun.'},{test:"G6.7",q:"Q12",err:'Typed "ourself" for plural subject "We" — used singular "-self" suffix instead of plural "-selves."'}]},

// ── Q5: Comma — nonrestrictive appositive (L.6.2a) ──────────────────────────
{skill:"Comma — Nonrestrictive Elements",sc:"#0F6E56",sb:"#E1F5EE",
q:'Which change, if any, is needed to the underlined text?\n\n"Dr. Amara Osei a cardiologist at the university hospital, has published over forty research papers on heart disease."\n\n(Underlined: Osei a cardiologist)',
tip:"Look at the phrase between 'Osei' and 'has published' and decide what punctuation it requires.",
hint:'The phrase "a cardiologist at the university hospital" is an appositive — a noun phrase placed right after "Dr. Amara Osei" that renames or describes her. Since we already know who she is from her name, this information is nonrestrictive (non-essential). Nonrestrictive appositives must be completely enclosed by commas — one comma before the phrase and one comma after it. Count how many commas currently surround this phrase.',
opts:["Osei, a cardiologist","Osei — a cardiologist","Osei; a cardiologist","No change"],
ans:0,
wrongs:[null,"A dash can set off a nonrestrictive element, but if you use a dash before an appositive, you must use another dash after it to close it — not a comma. The original sentence already has a comma after 'hospital,' so mixing a dash before and a comma after creates inconsistent punctuation. Commas are the standard way to set off appositives.","A semicolon joins two independent clauses or separates items in a complex list. It cannot introduce an appositive phrase. 'A cardiologist at the university hospital' is a phrase, not an independent clause, so a semicolon is grammatically incorrect here.","The sentence is missing a comma after 'Osei.' The phrase 'a cardiologist at the university hospital' is a nonrestrictive appositive that must have commas on both sides. 'No change' would leave the error in place."],
exp:'The answer is "Osei, a cardiologist" — adding a comma after "Osei" to open the appositive phrase. The full corrected sentence: "Dr. Amara Osei, a cardiologist at the university hospital, has published over forty research papers on heart disease."\n\nAn appositive is a noun or noun phrase that immediately follows another noun to rename or describe it. When the appositive is nonrestrictive (non-essential — the sentence\'s core meaning is clear without it), it must be enclosed by commas on BOTH sides. The original sentence already has the closing comma after "hospital" but is missing the opening comma after "Osei."',
mapTo:"G6.11 Q5",teks:"L.6.2a",
prevFails:[{test:"G6.7",q:"Q9",err:'Placed only the opening comma before appositive "a hidden gem" — omitted the closing comma.'}]},

// ── Q6: Comma — appositive, opening comma missing (L.6.2a) ──────────────────
{skill:"Comma — Nonrestrictive Elements",sc:"#0F6E56",sb:"#E1F5EE",
q:'Which change, if any, is needed to the underlined text?\n\n"My neighbor Mr. Castellano a retired firefighter, volunteers at the animal shelter every weekend."\n\n(Underlined: Castellano a retired)',
tip:"Identify the phrase that describes Mr. Castellano and decide what punctuation should surround it.",
hint:'The phrase "a retired firefighter" is a nonrestrictive appositive — it adds information about Mr. Castellano but is not essential to identify which neighbor is meant (his name already does that). Ask yourself: is there a comma before "a retired firefighter"? Is there one after it? A nonrestrictive appositive needs commas on both sides to be completely enclosed.',
opts:["Castellano, a retired","Castellano: a retired","Castellano. A retired","No change"],
ans:0,
wrongs:[null,"A colon introduces a list, a quotation, or an explanation — it cannot introduce an appositive in the middle of a sentence. Using a colon here would break the sentence structure incorrectly.","A period ends a sentence. 'A retired firefighter' is a phrase that belongs in the middle of this sentence — splitting it into two sentences with a period creates a fragment ('A retired firefighter, volunteers at the animal shelter every weekend' is not a complete sentence).","The sentence is missing a comma after 'Castellano.' Without it, 'a retired firefighter' is not properly set off from the name. The sentence needs a comma before the appositive phrase to enclose it correctly."],
exp:'The answer is "Castellano, a retired" — a comma after "Castellano" opens the nonrestrictive appositive. The corrected sentence: "My neighbor Mr. Castellano, a retired firefighter, volunteers at the animal shelter every weekend."\n\nKey rule: nonrestrictive appositives need paired commas — one before and one after. The original had the closing comma (after "firefighter") but was missing the opening comma (after "Castellano"). This is the most common appositive comma error: students add one comma but forget the other.',
mapTo:"G6.11 Q2",teks:"L.6.2a",
prevFails:[{test:"G6.7",q:"Q9",err:'Missing closing comma around appositive.'},{test:"G6.7",q:"Q20",err:'Did not identify incorrect commas around a restrictive "that" clause.'}]},

// ── Q7: Comma — conjunction between independent clauses (L.6.2a) ─────────────
{skill:"Comma — Nonrestrictive Elements",sc:"#0F6E56",sb:"#E1F5EE",
q:'Which change, if any, is needed to the underlined text?\n\n"Maya studied marine biology in college and, she now leads a conservation project in the Pacific."\n\n(Underlined: college and, she)',
tip:"Look at where the comma is placed in relation to the word 'and' and think about what punctuation rule applies here.",
hint:'"And" is a coordinating conjunction. When a coordinating conjunction (and, but, or, so, yet, for, nor) joins two independent clauses, a comma goes BEFORE the conjunction — not after it. The acronym FANBOYS helps remember them: For, And, Nor, But, Or, Yet, So. Test this sentence: is "Maya studied marine biology in college" a complete sentence? Is "she now leads a conservation project in the Pacific" a complete sentence? If both can stand alone, they are two independent clauses, and the comma belongs before "and."',
opts:["college, and she","college and she","college, and, she","No change"],
ans:0,
wrongs:[null,"Removing the comma entirely would create a run-on sentence if both clauses are independent. Two independent clauses joined by a coordinating conjunction do need a comma — but it must come before 'and,' not after it.","Adding a second comma after 'and' creates two commas around the conjunction, which is incorrect. Only one comma is used, and it goes before the conjunction, not after it or on both sides.","The original sentence has the comma in the wrong position — after 'and' instead of before it. A sentence with two independent clauses joined by 'and' needs the comma before 'and.' This is an error that needs correcting."],
exp:'"College, and she" is correct — the comma moves from after "and" to before it. Corrected sentence: "Maya studied marine biology in college, and she now leads a conservation project in the Pacific."\n\nRule: when two independent clauses are joined by a coordinating conjunction (FANBOYS: For, And, Nor, But, Or, Yet, So), place a comma before the conjunction. Never after it. A comma after a conjunction interrupts the natural flow between the conjunction and the clause it introduces.',
mapTo:"G6.11 Q3",teks:"L.6.2a",
prevFails:[{test:"G6.7",q:"Q9",err:'Comma placement errors around nonrestrictive elements.'},{test:"G6.7",q:"Q20",err:'Confusion about comma rules for restrictive vs. nonrestrictive clauses.'}]},

// ── Q8: Context clues — contrastive clue (L.6.4a) ───────────────────────────
{skill:"Context Clues — Word Meaning",sc:"#D85A30",sb:"#FAECE7",
q:'What does the word "tenacious" most nearly mean as used in the sentence below?\n\n"Unlike her brother, who gave up after one failed attempt, Priya was tenacious — she kept trying for months until she finally solved the problem."',
tip:"Use the evidence in the surrounding sentence rather than guessing from the word itself.",
hint:'Look for two types of clues in this sentence:\n1. CONTRAST CLUE — the word "unlike" signals that Priya and her brother are opposites. Her brother "gave up after one failed attempt." Priya is the opposite of that.\n2. INLINE DEFINITION — the dash (—) often introduces a direct explanation or example. What phrase comes right after the dash? That phrase defines "tenacious" directly.\n\nCombine both clues to choose the most precise answer.',
opts:["easily discouraged by failure","persistent and refusing to give up","talented beyond her years","cautious and methodical"],
ans:1,
wrongs:["'Easily discouraged by failure' describes her brother — the person Priya is being contrasted with. The word 'unlike' signals that Priya is the opposite of her brother. If her brother gives up easily, Priya must not give up easily.","'Talented beyond her years' is about natural ability. The context is entirely about persistence — how long she kept trying, not how gifted she was. Substitute this definition: 'Priya was talented beyond her years — she kept trying for months.' Does 'talented' explain why she kept trying? No. Always test definitions by substituting them.",null,"'Cautious and methodical' means careful and step-by-step. The context does not mention how she worked, only that she kept working despite failure. 'Tenacious' is about not stopping, not about the manner of working."],
exp:'"Persistent and refusing to give up" is correct. Two clues work together: (1) The contrast clue: "unlike her brother, who gave up after one failed attempt" — Priya is the opposite, so she does NOT give up. (2) The inline definition: "she kept trying for months until she finally solved the problem" — this phrase after the dash defines tenacious directly.\n\nContext clue strategy: always look for contrast words (unlike, but, however, while, on the other hand) and definition signals (dashes, commas, "which means," "or," "also known as"). These sentence structures are designed to help you understand unfamiliar words without a dictionary.',
mapTo:"G6.11 Q15",teks:"L.6.4a",
prevFails:[{test:"G6.9",q:"Q8",err:'Chose "Conflict" for "crisis" — prior word association overrode the explicit inline context clue.'},{test:"G6.7",q:"Q5",err:'Did not use contrast between "simple child" and "seasoned hunters" to identify "seasoned" = made skillful by experience.'},{test:"G6.7",q:"Q17",err:'Chose "popular" for "influential" — ignored causal clue "helped lead to the integration of the military."'}]},

// ── Q9: Context clues — dictionary multi-definition (L.6.4d) ────────────────
{skill:"Context Clues — Dictionary Definitions",sc:"#D85A30",sb:"#FAECE7",
q:'Read the sentence and the dictionary entry. Which definition BEST fits how "facilitate" is used?\n\nSentence: "The new community center was built to facilitate communication between residents and local government officials."\n\nDictionary entry for "facilitate":\n  1. to make an action or process easier or more achievable\n  2. to lead or chair a group meeting or discussion\n  3. to cause a chemical reaction to proceed more rapidly\n  4. to provide a facility or building for a specific use',
opts:["Definition 2 — to lead or chair a group meeting","Definition 4 — to provide a facility or building","Definition 3 — to cause a chemical reaction","Definition 1 — to make a process easier or more achievable"],
ans:3,
tip:"Substitute each definition into the sentence and test whether it captures the exact meaning.",
hint:'Do not match by word similarity or topic. "Facilitate" looks like "facility" — but that does not mean Definition 4 is correct. And the sentence is about a community center (a building) — but that is the setting, not what "facilitate" means in context.\n\nFor each definition, substitute the definition\'s meaning into the sentence:\n"The new community center was built to [make communication easier] between residents and officials."\n"The new community center was built to [lead a group meeting] between residents and officials."\nWhich substitution makes the sentence mean exactly what it says?',
wrongs:["'To lead or chair a group meeting' is too narrow. The sentence says the building was built to facilitate communication broadly — not to run a specific meeting. Substitute it: 'built to chair a group meeting between residents and officials.' Does that match the full meaning of what a community center is for? A building is not a chair or facilitator of meetings.","'To provide a facility or building' is a trap based on word similarity — 'facilitate' looks like 'facility.' But the community center is the subject doing the facilitating, not the thing being provided. Substitute it: 'built to provide a building between residents and officials.' That does not make sense. Never match definitions by how similar the words look.",null,"'To cause a chemical reaction' has nothing to do with communication or community centers. This definition belongs in a science context. Substitute it: 'built to cause a chemical reaction between residents and officials.' Clearly wrong — always eliminate definitions that don't match the subject matter of the sentence at all."],
exp:'Definition 1 — "to make a process easier or more achievable" — fits best. Substitute it: "The new community center was built to make communication between residents and government officials easier and more achievable." That matches the sentence exactly.\n\nThe trap options:\n• Definition 2 (chair a meeting) is too specific — facilitating communication is broader than running one meeting.\n• Definition 4 (provide a facility) is a word-similarity trap — "facilitate" looks like "facility" but they have different meanings.\n• Definition 3 (chemical reaction) is clearly off-topic.\n\nKey skill: always substitute the definition into the sentence word for word and ask: does this capture exactly what the sentence is saying?',
mapTo:"G6.11 Q18",teks:"L.6.4d",
prevFails:[{test:"G6.9",q:"Q19",err:'Chose the technology-related definition for "enabling" because the sentence mentioned computers — topic association instead of substitution and testing.'}]},

// ── Q10: Conjunctive adverbs — additive vs causal (L.6.3a) ──────────────────
{skill:"Conjunctive Adverbs",sc:"#633806",sb:"#FAEEDA",
q:'Which conjunctive adverb BEST completes the sentence?\n\n"The hikers trained for six months before the expedition. ___, they reached the summit without any major difficulties."',
tip:"Before choosing a word, identify the logical relationship between the two sentences.",
hint:'Conjunctive adverbs signal specific logical relationships between sentences. The main categories:\n\n• ADDITIVE (moreover, furthermore, additionally, in addition): the second sentence adds more information. Think: "and also."\n• CAUSAL/RESULT (consequently, therefore, thus, as a result): the second sentence is the result of the first. Think: "so" or "because of that."\n• CONTRAST (however, nevertheless, on the other hand): the second sentence contradicts or pushes back. Think: "but."\n• TEMPORAL (meanwhile, subsequently, afterward): shows time order or simultaneous events.\n\nAsk: does the second sentence happen because of the first, or does it just add more information?',
opts:["Moreover","However","Consequently","Meanwhile"],
ans:2,
wrongs:["'Moreover' signals addition — it introduces extra information added on top of what was already said. The question is: why did they reach the summit without difficulty? Because they trained for six months. That is cause → effect, not addition. 'Moreover' would work if the second sentence were adding another fact about the training, not describing its result.","'However' signals contrast — it means 'but' or 'despite that.' Is there any contradiction between training for six months and reaching the summit without difficulty? No — training and succeeding are connected in the same direction, not opposed. Contrast words are used when the second sentence surprises you after the first.","'Meanwhile' signals that two things are happening at the same time. The summit was reached after the training, not during it. If both events were happening simultaneously, 'meanwhile' could work. But sequentially, one event led to the other.",null],
exp:'"Consequently" is correct — it means "as a result." The logical relationship is cause → effect: six months of training caused (led to) reaching the summit without difficulty. Consequently, therefore, thus, and as a result all signal this causal relationship.\n\n"Moreover" is the most common wrong choice because students see two positive, related sentences and choose the additive word. The test: ask why the second event happened. If it happened because of the first sentence, use a causal word. If it is just additional information, use an additive word.',
mapTo:"G6.11 Q22",teks:"L.6.3a",
prevFails:[{test:"G6.9",q:"Q11",err:'Chose "Moreover" (additive) instead of "Consequently" (causal). Coach\'s pride → arranged training camp = cause→effect, not addition.'},{test:"G6.7",q:"Q4",err:'Chose "On the contrary" (contrast) instead of "Therefore" (causal).'},{test:"G6.6",q:"Q13",err:'Chose "Meanwhile" (temporal) instead of "Furthermore" (additive).'}]},

// ── Q11: Sentence structure — classification (L.6.3a) ───────────────────────
{skill:"Sentence Structure",sc:"#185FA5",sb:"#E6F1FB",
q:'What type of sentence is each of the following?\n\n(1) Although the storm was severe, the rescue team continued their work.\n(2) The dog barked loudly, and the cat ran under the bed.\n(3) My sister graduated from college last spring.',
tip:"For each sentence, identify every clause and determine whether it can stand alone as a complete thought.",
hint:'A CLAUSE has a subject and a verb. There are two kinds:\n• INDEPENDENT CLAUSE: has a subject and verb AND can stand alone as a complete sentence.\n• DEPENDENT CLAUSE: has a subject and verb but CANNOT stand alone — it depends on the main clause. Dependent clauses are often introduced by subordinating words: although, because, since, while, if, unless, when, even though, before, after.\n\nSentence types:\n• SIMPLE: one independent clause only\n• COMPOUND: two or more independent clauses joined by a coordinating conjunction (FANBOYS: for, and, nor, but, or, yet, so) or a semicolon\n• COMPLEX: one independent clause + at least one dependent clause\n\nTest sentence 1: can "Although the storm was severe" stand alone as a complete sentence?',
opts:[
  "1=Complex, 2=Compound, 3=Simple",
  "1=Compound, 2=Complex, 3=Simple",
  "1=Simple, 2=Compound, 3=Complex",
  "1=Complex, 2=Simple, 3=Compound"
],
ans:0,
wrongs:[null,"Sentence 1 starts with 'Although' — a subordinating conjunction. 'Although the storm was severe' cannot stand alone as a sentence. That makes it a dependent clause, which creates a complex sentence — not compound. A compound sentence requires two independent clauses, both of which can stand alone.","Sentence 3 — 'My sister graduated from college last spring' — has one subject (my sister), one verb (graduated), and no dependent clause or second independent clause. That is a simple sentence, not a complex one. A complex sentence needs a dependent clause introduced by a subordinating word.","Sentence 2 has 'The dog barked loudly' (independent) + 'and' (coordinating conjunction) + 'the cat ran under the bed' (independent). Two independent clauses joined by 'and' = compound. Compound is not the same as complex."],
exp:'The answers are: (1) Complex, (2) Compound, (3) Simple.\n\nSIMPLE sentence — one independent clause only:\nSentence 3: "My sister graduated from college last spring." One subject, one predicate, no dependent clause.\n\nCOMPOUND sentence — two or more independent clauses:\nSentence 2: "The dog barked loudly" + "and" + "the cat ran under the bed." Each part can stand alone, joined by the coordinating conjunction "and."\n\nCOMPLEX sentence — one independent clause + a dependent clause:\nSentence 1: "Although the storm was severe" is the dependent clause (introduced by the subordinating conjunction "although" — it cannot stand alone). "The rescue team continued their work" is the independent clause.\n\nSubordinating conjunctions to recognize: although, because, since, while, if, unless, when, even though, before, after, despite, as long as.',
mapTo:"G6.11 Q22",teks:"L.6.3a",
prevFails:[{test:"G6.9",q:"Q6",err:'Chose "Simple" for "Despite the heavy rain, we decided to go out." Did not recognize the dependent phrase — classified by counting subject-verb pairs only.'}]},

// ── Q12: Figurative language — personification (L.6.5a) ─────────────────────
{skill:"Figurative Language",sc:"#534AB7",sb:"#EEEDFE",
q:'What type of figurative language is used in the sentence below?\n\n"The ancient oak tree reached its long arms across the yard and pulled the afternoon sun toward its roots."',
tip:"Identify what the author is doing to the oak tree and which literary device that represents.",
hint:'Four common figurative language devices:\n\n• PERSONIFICATION: giving a non-living thing a human or animal quality — an action, emotion, or ability that only living things have. The non-living thing performs the living action.\n• HYPERBOLE: extreme exaggeration beyond what is literally possible, used for emphasis. A quantity or degree is stretched to an impossible extreme.\n• METAPHOR: directly calling one thing another thing ("Life is a journey"). X IS Y.\n• SIMILE: comparing two things using "like" or "as" ("runs like the wind").\n\nAsk: is the oak tree being given a human ability it cannot actually have? Or is something being exaggerated to an impossible degree?',
opts:[
  "Hyperbole — the tree\'s reach is exaggerated for dramatic effect",
  "Simile — the tree is compared to a person reaching for the sun",
  "Personification — the tree is given human actions (reaching, pulling)",
  "Metaphor — the tree is directly called a person"
],
ans:2,
wrongs:["Hyperbole exaggerates a quantity or degree to an impossible extreme: 'I waited a million years,' 'the bag weighed a ton.' In this sentence, nothing is being stretched to an impossible extreme — the tree is being given human physical actions. Exaggeration and animation are different literary devices.","A simile compares two things using the words 'like' or 'as.' Read the sentence again — is there a 'like' or 'as' present? Is the tree being compared to a person, or is the tree itself performing a human action directly?",null,"A metaphor says one thing IS another thing directly — 'The classroom was a zoo,' 'Time is money.' The sentence does not say the tree IS a person. Instead, the tree is performing human actions (reaching, pulling). That is giving a non-living thing a living quality — which is personification, not metaphor."],
exp:'The answer is personification. The oak tree — a non-living object — is given human physical actions: "reached its long arms" and "pulled the afternoon sun toward its roots." These are things only living creatures with arms can do.\n\nPersonification: attributing a human or animal quality (action, emotion, voice, behavior) to a non-living thing.\nExamples: "The wind whispered." "The sun smiled." "The car groaned." "Fear crept in."\n\nHyperbole is a common wrong choice when language feels vivid. The test: is something being exaggerated to an impossible degree, or is a non-living thing being given a living ability? Those are different devices.',
mapTo:"G6.11 Q24",teks:"L.6.5a",
prevFails:[{test:"G6.9",q:"Q3",err:'Chose "hyperbole" for "the wind howled" — recognized vividness but did not identify attribution of animal behavior to inanimate object as personification.'}]},

// ── Q13: Connotation (L.6.5c) ───────────────────────────────────────────────
{skill:"Connotation & Word Choice",sc:"#D85A30",sb:"#FAECE7",
q:'A student is writing about a leader who speaks her mind directly and is not afraid to say difficult things. Which word has the MOST POSITIVE connotation for describing this leader\'s communication style?\n\n"Council members described her speaking style as ___."',
tip:"Think about the attitude or judgment each word implies, not just its definition.",
hint:'CONNOTATION is the emotional impression or attitude a word carries beyond its literal dictionary meaning. Words with similar meanings can have very different connotations:\n\n• POSITIVE connotation: implies an admirable or favorable quality\n• NEGATIVE connotation: implies an unfavorable or critical quality\n• NEUTRAL: no strong judgment\n\nAll four options below relate to speaking directly. But which one implies it is a good quality in a leader? Which ones imply it is rude, excessive, or unkind? If someone used this word to describe you, would you feel complimented or criticized?',
opts:["blunt","harsh","forthright","aggressive"],
ans:2,
wrongs:["'Blunt' carries a mildly negative or neutral-to-negative connotation — it usually implies someone is direct without caring whether they hurt others' feelings. It describes the manner as lacking sensitivity. While not as strongly negative as 'harsh,' it does not imply admirable directness.","'Harsh' has a clearly negative connotation — it implies cruelty, severity, or unkindness. Describing a leader as 'harsh' would suggest her directness crosses into being hurtful or punishing to others. This is a criticism, not a compliment.",null,"'Aggressive' has a negative connotation in this context — it implies the leader pushes too hard, uses force, or dominates others in a way that goes beyond what is appropriate. While sometimes used positively in sports or business contexts, in describing someone's communication style it suggests they are intimidating or hostile."],
exp:'"Forthright" has the most positive connotation — it means honest, direct, and confident in sharing one\'s views, but with the implication that this is an admirable quality. A forthright person speaks truth even when it is difficult, and this is seen as a strength.\n\nConnotation comparison for these four words:\n• blunt (neutral-to-negative: direct but potentially tactless)\n• harsh (negative: severe, unkind)\n• forthright (positive: admirably honest and direct)\n• aggressive (negative: overly forceful or hostile)\n\nWhen all options have similar dictionary meanings, connotation — the emotional tone — is what distinguishes them.',
mapTo:"G6.11 Q21",teks:"L.6.5c",
prevFails:[{test:"G6.5",q:"Q23",err:'Chose "to authorize or allow" for "endorse" — confused authorizing with publicly supporting; did not distinguish precise meanings of closely related words.'}]},

// ── Q14: Spelling — commonly misspelled word (L.6.2b) ───────────────────────
{skill:"Spelling",sc:"#0F6E56",sb:"#E1F5EE",
q:'Which sentence contains a spelling error?\n\n(1) The committee will convene tomorrow to discuss the new policy.\n(2) She recieved a scholarship from three different universities.\n(3) The athlete\'s endurance was remarkable throughout the competition.\n(4) He acknowledged the mistake and promised to correct it.',
tip:"Read each word carefully and look for the one that does not follow standard spelling rules.",
hint:'"Received" is one of the most commonly misspelled words. The rule to remember: "i before e, except after c." When the letters i and e appear together, i normally comes first (believe, achieve, field). BUT after the letter c, the order reverses — e comes before i (receive, deceive, ceiling, receipt). So: rec-EI-ved, not rec-IE-ved.',
opts:["Sentence 1 — convene","Sentence 2 — recieved","Sentence 3 — endurance","Sentence 4 — acknowledged"],
ans:1,
wrongs:["'Convene' is spelled correctly — c-o-n-v-e-n-e. It means to come together for a meeting. No spelling error in sentence 1.","'Endurance' is spelled correctly — e-n-d-u-r-a-n-c-e. No spelling error in sentence 3.",null,"'Acknowledged' is spelled correctly — a-c-k-n-o-w-l-e-d-g-e-d. No spelling error in sentence 4."],
exp:'Sentence 2 contains the error: "recieved" should be "received." The rule: "i before e, except after c." After the letter c, e always comes before i. So: rec-EI-ved. The vowels are in reverse order after the c.\n\nOther words that follow this "except after c" pattern: ceiling, deceive, receipt, perceive, conceive.\nWords that follow the basic "i before e" rule: believe, achieve, field, yield, piece, grief.\n\nA second commonly tested spelling: "separate" (not "seperate") — remember there is "a rat" in sep-A-RAT-e.',
mapTo:"G6.11 Q7 and Q13",teks:"L.6.2b",
prevFails:[{test:"G6.8",q:"Q6",err:'Chose to change "all together" to "altogether" — confused the two-word phrase "all together" (as a group) with the single word "altogether" (completely/entirely).'}]},

// ── Q15: Source reliability (W.6.8) ─────────────────────────────────────────
{skill:"Source Reliability",sc:"#185FA5",sb:"#E6F1FB",
q:'Students are writing an argumentative essay about whether schools should eliminate standardized testing. Which TWO sources would provide the most relevant and reliable information for this essay?\n\nA) A Reddit thread where teachers share their opinions about testing\nB) A peer-reviewed study from an education journal examining the relationship between standardized tests and student learning outcomes\nC) A memoir by a student describing her personal experience with test anxiety\nD) A report from the National Education Association analyzing the effects of standardized testing on curriculum design\nE) A blog post by a parent explaining why their child dislikes tests',
tip:"Apply two separate tests to every source before deciding.",
hint:'To evaluate sources for an argumentative essay, use two filters on each source:\n\n1. RELEVANT: Does the source directly address the specific question — whether schools should eliminate standardized testing? A source about one person\'s experience may be interesting but may not provide evidence that applies broadly.\n\n2. RELIABLE: Does the source come from a verified expert or institution — not an unverified personal account, forum post, or blog? Reliable sources include: peer-reviewed academic journals, government agencies, established professional organizations (like the National Education Association), and reputable news organizations with editorial standards.\n\nBoth conditions must be true. A source can be relevant but unreliable (Reddit thread about testing) or reliable but not relevant (a science journal article about biology).',
opts:["A and C","B and D","C and E","A and D"],
ans:1,
wrongs:["Source A (Reddit thread) is not reliable — forum posts are unverified opinions with no editorial oversight. Source C (a personal memoir) is one person's experience — it may be relevant to test anxiety but does not provide the kind of broad evidence needed to argue whether all schools should eliminate testing. Neither source passes the reliability test for an argumentative essay.","Source C (personal memoir) and Source E (parent's blog) are both personal accounts — one person's experience or opinion. Neither is a verified expert source or an institutional study. Personal stories can add emotional context to an essay but do not constitute reliable evidence for an argument about policy.","Source A (Reddit thread) is an unverified forum — opinions shared anonymously with no fact-checking. Source D (National Education Association report) is both relevant AND reliable. But the question asks for the best combination. Pair D with a source that is equally strong on both tests.",null],
exp:'The answers are B and D.\n\nSource B (peer-reviewed study from an education journal): RELIABLE — peer-reviewed means other experts reviewed the research before publication. RELEVANT — directly examines the relationship between standardized tests and student learning.\n\nSource D (National Education Association report): RELIABLE — the NEA is a major professional organization for educators, making it an authoritative institutional source. RELEVANT — directly analyzes the effects of standardized testing on schools.\n\nThe rejected sources:\n• A (Reddit) — fails reliability: unverified, no editorial standards\n• C (memoir) — fails reliability for policy argument: one personal experience\n• E (parent blog) — fails reliability: personal opinion, not expert or institutional',
mapTo:"G6.11 Q9",teks:"W.6.8",
prevFails:[{test:"G6.8",q:"Q21",err:'Chose a patchwritten paraphrase — understood source attribution but not the distinction between close paraphrasing and genuine restructuring.'}]}

var cur=0,sel=null,submitted=false;

  app.innerHTML='<div class="quiz-header"><div class="avatar">LG</div><div class="header-text"><h1>Language Practice</h1><p>Based on your last 3 tests · G6.9, G6.8, G6.7</p></div></div>'

}

function goBack(){
  if(cur<=0)return;
  submitted=false;sel=null;lastWrong=null;hintUnlocked=false;hintOpen=false;
  cur--;
  if(scores[cur]!==null){submitted=true;sel=QS[cur].ans;}
  render();
}
function toggleHint(){if(!hintUnlocked)return;hintOpen=!hintOpen;render();}
function pick(i){if(submitted||triedPerQ[cur].indexOf(i)!==-1)return;sel=i;render();}
function doSubmit(){
  if(sel===null||submitted)return;
  if(sel===QS[cur].ans){
    submitted=true;
    if(scores[cur]===null)scores[cur]=(triedPerQ[cur].length===0);
    lastWrong=null;render();
  } else {
    triedPerQ[cur].push(sel);
    if(scores[cur]===null)scores[cur]=false;
    hintUnlocked=true;
    var msg=QS[cur].wrongs[sel];
    if(!msg)msg="That's not correct. The hint is now available if you need extra guidance.";
    lastWrong=msg;sel=null;render();
  }
}
function next(){
  cur++;sel=null;submitted=false;lastWrong=null;hintUnlocked=false;hintOpen=false;
  if(cur>=QS.length){STATE='results';render();return;}
  if(scores[cur]!==null){submitted=true;sel=QS[cur].ans;}
  render();
}

function renderResults(app){
  var total=QS.length,correct=scores.filter(function(s){return s===true;}).length;

    if(scores[i]===true)skillMap[q.skill].correct++;
  });
  var rowsHtml=Object.keys(skillMap).map(function(name){

    var col=sp>=70?'#1D9E75':sp>=50?'#EF9F27':'#E24B4A';

  }).join('');
  var r=44,circ=2*Math.PI*r,dash=(pct/100)*circ,ringColor=pct>=70?'#1D9E75':pct>=50?'#EF9F27':'#E24B4A';
  var headline=pct>=80?'Great work, Lily!':pct>=60?'Good effort, Lily!':'Keep practicing, Lily!';
  app.innerHTML='<div class="quiz-header"><div class="avatar">LG</div><div class="header-text"><h1>Language Practice</h1><p>Quiz complete</p></div></div>'
    +'<div class="card" style="text-align:center;padding:30px 20px 24px">'
    +'<div class="score-ring"><svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="'+r+'" fill="none" stroke="#e4e3df" stroke-width="8"/><circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+ringColor+'" stroke-width="8" stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round"/></svg><div class="score-pct" style="color:'+ringColor+'">'+pct+'%</div></div>'
    +'<div style="font-size:20px;font-weight:800;margin-bottom:4px">'+headline+'</div>'
    +'<div style="font-size:14px;color:#666">'+correct+' of '+total+' correct on first try</div></div>'
    +'<div class="card"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:12px">Skill Breakdown</div>'+rowsHtml+'</div>'
    +'<div style="display:flex;gap:10px;margin-bottom:20px">'
    +'<button class="btn btn-back" style="flex:1" onclick="startReview()">Review all answers</button>'
    +'<button class="btn btn-primary" style="flex:1;margin-top:0" onclick="restart()">Practice again</button></div>'
    +'<p style="font-size:12px;color:#888;text-align:center">Share these results with your teacher after completing the quiz.</p>';
}

function startReview(){STATE='review';render();}

function renderReview(app){
  var letters=['A','B','C','D'];
  var itemsHtml=QS.map(function(q,i){
    var firstTry=scores[i]===true,tried=triedPerQ[i];
    var cls='review-item '+(firstTry?'first-try':'needed-retry');
    var badge=firstTry?'<span class="review-badge ok">✓ First try</span>':'<span class="review-badge bad">✗ Needed '+(tried.length+1)+' attempt'+(tried.length!==0?'s':'')+'</span>';
    var optsHtml=q.opts.map(function(o,j){
      var isCorrect=j===q.ans,wasWrong=tried.indexOf(j)!==-1;
      return '<div class="review-opt '+(isCorrect?'correct-opt':wasWrong?'student-wrong':'plain')+'"><span style="font-weight:700;margin-right:6px">'+letters[j]+'.</span>'+o+'</div>';
    }).join('');
    return '<div class="'+cls+'"><div class="review-qnum">Question '+(i+1)+' · '+q.skill+' · '+q.teks+'</div>'
      +badge+'<div class="review-qtext">'+q.q+'</div>'
      +'<div class="review-options">'+optsHtml+'</div>'
      +'<div class="review-exp">'+q.exp+'</div></div>';
  }).join('');
  app.innerHTML='<div class="quiz-header"><div class="avatar">LG</div><div class="header-text"><h1>Language Practice</h1><p>Answer review</p></div></div>'
    +'<div style="margin-bottom:16px;display:flex;gap:10px">'
    +'<button class="btn btn-back" style="flex:0 0 auto" onclick="STATE=\'results\';render()">← Back to results</button>'
    +'<button class="btn btn-primary" style="flex:1;margin-top:0" onclick="restart()">Practice again</button></div>'
    +'<p style="font-size:13px;color:#666;margin-bottom:14px">Green = correct answer &nbsp;·&nbsp; Red strikethrough = your wrong attempt(s)</p>'
    +itemsHtml;
}

function restart(){
  cur=0;sel=null;submitted=false;scores=QS.map(function(){return null;});
  triedPerQ=QS.map(function(){return[];});
  lastWrong=null;hintUnlocked=false;hintOpen=false;STATE='quiz';render();
}
render();
</script>
</body>
